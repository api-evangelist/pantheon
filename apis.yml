apis:
  - aid: pantheon:pantheon-api
    name: Pantheon REST API
    description: >-
      The Pantheon platform REST API (terminus.pantheon.io) underpins the
      Terminus CLI and enables programmatic management of sites, environments,
      deployments, domains, backups, teams, organizations, SSH keys, secrets,
      and workflows on the Pantheon WebOps platform.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.pantheon.io/terminus

aid: pantheon
name: Pantheon
description: >-
  Pantheon is a WebOps platform for WordPress and Drupal that provides a REST
  API and CLI (Terminus) for managing sites, environments, deployments, domains,
  backups, and team workflows. The platform serves over 700,000 sites with
  built-in dev/staging/production environments, Global CDN, automated updates,
  and portfolio governance tools.
